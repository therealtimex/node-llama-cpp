name: Watch llama.cpp
on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: watch-llama-cpp-master
  cancel-in-progress: false

jobs:
  sync-release:
    name: Sync latest llama.cpp release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install modules
        run: npm ci --ignore-scripts
      - name: Resolve current shipped llama.cpp release
        id: currentRelease
        run: |
          current_release="$(git log --format=%s --grep='^feat: ship llama.cpp ' -n 1 | sed 's/^feat: ship llama.cpp //')"
          echo "Current shipped llama.cpp release: ${current_release:-<none>}"
          echo "currentRelease=$current_release" >> "$GITHUB_OUTPUT"
      - name: Resolve latest llama.cpp release
        id: syncRelease
        run: npx --no vite-node ./scripts/syncLlamaCppRelease.ts --currentRelease "${{ steps.currentRelease.outputs.currentRelease }}" --githubOutput
      - name: Commit latest llama.cpp release
        if: steps.syncRelease.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "feat: ship llama.cpp ${{ steps.syncRelease.outputs.latestRelease }}"
          git push origin HEAD:master
      - name: Trigger Build workflow
        if: steps.syncRelease.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L --fail \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            -d '{"ref":"master","inputs":{"full_release":"true","llama_cpp_release":"${{ steps.syncRelease.outputs.latestRelease }}"}}'
      - name: Trigger Test workflow
        if: steps.syncRelease.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L --fail \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/test.yml/dispatches \
            -d '{"ref":"master","inputs":{"llama_cpp_release":"${{ steps.syncRelease.outputs.latestRelease }}"}}'
